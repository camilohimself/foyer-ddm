[build]
  publish = "dist"
  command = "npm run build"
[build.processing.html]
  pretty_urls = false
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================================
# REDIRECTS INTERNES (pages restructurées dans le nouveau site)
# ============================================================================

[[redirects]]
  from = "/retraites/week-end"
  to = "/retraites/week-ends"
  status = 301
[[redirects]]
  from = "/retraites/couples"
  to = "/retraites/week-ends#en-couple"
  status = 301
[[redirects]]
  from = "/retraites/familles"
  to = "/retraites/week-ends#en-famille"
  status = 301
[[redirects]]
  from = "/sejour/tarifs"
  to = "/sejour"
  status = 301
[[redirects]]
  from = "/contact"
  to = "/contact/inscription"
  status = 301

